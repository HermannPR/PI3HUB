<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Pi Remote</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }

body {
  background: #1a1a2e; color: #eee;
  font-family: system-ui, sans-serif;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

#tabs { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; flex-shrink: 0; }
.tab {
  flex: 1; padding: 12px 0; text-align: center;
  font-size: 12px; font-weight: 700; letter-spacing: .4px; color: #555; cursor: pointer;
}
.tab.active { color: #e94560; border-bottom: 2px solid #e94560; margin-bottom: -2px; }

.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
.panel.active { display: flex; }

/* ── TOUCHPAD ── */
#touchpad { flex: 1; background: #0d0d1a; position: relative; }
#touchpad-hint {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; color: #2a2a3a; font-size: 13px; pointer-events: none; line-height: 1.9;
}
#mouse-buttons { display: flex; gap: 1px; background: #0f3460; flex-shrink: 0; }
.mbtn {
  flex: 1; padding: 18px 0; text-align: center;
  background: #16213e; font-size: 14px; font-weight: 700; color: #bbb; cursor: pointer;
}
.mbtn:active { background: #e94560; color: #fff; }

/* ── KEYBOARD ── */
#keyboard-panel { background: #0d0d1a; padding: 6px 4px 10px; flex-shrink: 0; }
.kbd-row { display: flex; gap: 3px; justify-content: center; margin-bottom: 3px; }
.key {
  height: 42px; min-width: 28px; padding: 0 4px;
  background: #16213e; border: 1px solid #0f3460; border-radius: 6px;
  color: #ddd; font-size: 13px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex: 1; max-width: 46px;
}
.key.active-flash { background: #e94560; color: #fff; border-color: #e94560; }
.key.held { background: #0f3460; color: #7eb8ff; border-color: #1a4a8a; }
.key.wide  { max-width: 70px; flex: 1.5; }
.key.xwide { max-width: 150px; flex: 3; }
.key.mod   { background: #1a2a4a; color: #7eb8ff; }

/* ── PROMPT ── */
#prompt-panel {
  flex: 1; display: flex; flex-direction: column;
  padding: 14px 14px 12px; gap: 12px; background: #0d0d1a; touch-action: auto;
}
#prompt-input {
  flex: 1; background: #16213e; border: 2px solid #0f3460; border-radius: 12px;
  color: #eee; font-size: 17px; line-height: 1.5; padding: 14px;
  resize: none; outline: none; touch-action: auto; user-select: text;
  font-family: system-ui, sans-serif;
}
#prompt-input:focus { border-color: #e94560; }
#prompt-input::placeholder { color: #333; }

#prompt-actions { display: flex; gap: 10px; flex-shrink: 0; }

#btn-prompt-clear {
  width: 64px; height: 64px; border-radius: 12px;
  background: #16213e; border: 1px solid #0f3460;
  color: #555; font-size: 22px; cursor: pointer; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#btn-prompt-clear:active { background: #2a1a1a; color: #e94560; }

#btn-prompt-send {
  flex: 1; height: 64px; border-radius: 12px;
  background: #e94560; border: none;
  color: #fff; font-size: 20px; font-weight: 800;
  cursor: pointer; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  letter-spacing: .5px;
}
#btn-prompt-send:active { background: #c0304e; }

#prompt-status { font-size: 12px; color: #444; text-align: center; flex-shrink: 0; min-height: 18px; }

#status { padding: 3px 10px; font-size: 11px; color: #333; background: #111; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" onclick="switchTab('touchpad')">TOUCHPAD</div>
  <div class="tab" onclick="switchTab('keyboard')">KEYBOARD</div>
  <div class="tab" onclick="switchTab('prompt')">PROMPT</div>
</div>

<!-- TOUCHPAD -->
<div class="panel active" id="panel-touchpad">
  <div id="touchpad">
    <div id="touchpad-hint">
      Drag · move mouse<br>Tap · left click<br>
      2-finger drag · scroll<br>2-finger tap · right click
    </div>
  </div>
  <div id="mouse-buttons">
    <div class="mbtn" onpointerdown="mouseBtn('left','down')"  onpointerup="mouseBtn('left','up')"  onpointerleave="mouseBtn('left','up')">LEFT</div>
    <div class="mbtn" onpointerdown="mouseBtn('right','down')" onpointerup="mouseBtn('right','up')" onpointerleave="mouseBtn('right','up')">RIGHT</div>
  </div>
</div>

<!-- KEYBOARD -->
<div class="panel" id="panel-keyboard" style="overflow-y:auto; justify-content:flex-end">
  <div id="keyboard-panel">
    <div class="kbd-row">
      <div class="key" data-key="esc">Esc</div>
      <div class="key" data-key="1">1</div><div class="key" data-key="2">2</div>
      <div class="key" data-key="3">3</div><div class="key" data-key="4">4</div>
      <div class="key" data-key="5">5</div><div class="key" data-key="6">6</div>
      <div class="key" data-key="7">7</div><div class="key" data-key="8">8</div>
      <div class="key" data-key="9">9</div><div class="key" data-key="0">0</div>
      <div class="key" data-key="-">-</div><div class="key" data-key="=">=</div>
      <div class="key wide" data-key="backspace">⌫</div>
    </div>
    <div class="kbd-row">
      <div class="key wide" data-key="tab">Tab</div>
      <div class="key" data-key="q">Q</div><div class="key" data-key="w">W</div>
      <div class="key" data-key="e">E</div><div class="key" data-key="r">R</div>
      <div class="key" data-key="t">T</div><div class="key" data-key="y">Y</div>
      <div class="key" data-key="u">U</div><div class="key" data-key="i">I</div>
      <div class="key" data-key="o">O</div><div class="key" data-key="p">P</div>
      <div class="key" data-key="[">[</div><div class="key" data-key="]">]</div>
    </div>
    <div class="kbd-row">
      <div class="key" data-key="a">A</div><div class="key" data-key="s">S</div>
      <div class="key" data-key="d">D</div><div class="key" data-key="f">F</div>
      <div class="key" data-key="g">G</div><div class="key" data-key="h">H</div>
      <div class="key" data-key="j">J</div><div class="key" data-key="k">K</div>
      <div class="key" data-key="l">L</div><div class="key" data-key=";">;</div>
      <div class="key" data-key="'">'</div>
      <div class="key wide" data-key="enter">↵</div>
    </div>
    <div class="kbd-row">
      <div class="key wide mod" data-key="shift">⇧ Shift</div>
      <div class="key" data-key="z">Z</div><div class="key" data-key="x">X</div>
      <div class="key" data-key="c">C</div><div class="key" data-key="v">V</div>
      <div class="key" data-key="b">B</div><div class="key" data-key="n">N</div>
      <div class="key" data-key="m">M</div>
      <div class="key" data-key=",">,</div><div class="key" data-key=".">.</div>
      <div class="key" data-key="/">/</div>
      <div class="key wide mod" data-key="shift">⇧</div>
    </div>
    <div class="kbd-row">
      <div class="key wide mod" data-key="ctrl">Ctrl</div>
      <div class="key mod" data-key="alt">Alt</div>
      <div class="key xwide" data-key=" ">SPACE</div>
      <div class="key mod" data-key="home">⇱</div>
      <div class="key mod" data-key="end">⇲</div>
      <div class="key mod" data-key="delete">Del</div>
    </div>
    <div class="kbd-row">
      <div class="key wide mod" data-key="up">▲</div>
      <div class="key wide mod" data-key="down">▼</div>
      <div class="key wide mod" data-key="left">◀</div>
      <div class="key wide mod" data-key="right">▶</div>
    </div>
  </div>
</div>

<!-- PROMPT -->
<div class="panel" id="panel-prompt">
  <div id="prompt-panel">
    <textarea id="prompt-input"
      placeholder="Type your prompt here, then tap SEND ↵"
      autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="true">
    </textarea>
    <div id="prompt-actions">
      <div id="btn-prompt-clear" onclick="clearPrompt()">✕</div>
      <div id="btn-prompt-send"  onclick="sendPrompt()">SEND &nbsp;↵</div>
    </div>
    <div id="prompt-status"></div>
  </div>
</div>

<div id="status">Pi Remote · ready</div>

<script>
function switchTab(name) {
  const names = ["touchpad","keyboard","prompt"];
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", names[i] === name));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  if (name === "prompt") setTimeout(() => document.getElementById("prompt-input").focus(), 100);
}

function setStatus(msg) { document.getElementById("status").textContent = msg; }
function setPromptStatus(msg) { document.getElementById("prompt-status").textContent = msg; }

function post(path, data) {
  return fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  }).catch(() => setStatus("⚠ lost connection"));
}

// ── Prompt ──
function sendPrompt() {
  const txt = document.getElementById("prompt-input").value.trim();
  if (!txt) return;
  setPromptStatus("Sending…");
  post("/prompt", { text: txt }).then(() => {
    setPromptStatus("Sent ✓");
    document.getElementById("prompt-input").value = "";
    setTimeout(() => setPromptStatus(""), 2000);
  });
}

function clearPrompt() {
  document.getElementById("prompt-input").value = "";
  setPromptStatus("");
}

// ── Mouse buttons ──
function mouseBtn(btn, action) { post("/mouse", { btn, action }); }

// ── Touchpad (RAF-batched) ──
const pad  = document.getElementById("touchpad");
const hint = document.getElementById("touchpad-hint");
let touches = {}, pendingDx = 0, pendingDy = 0, rafId = null;
let moved = false, tapTimer = null, twoStart = 0, scrollAccum = 0;
const SPEED = 2.0, TAP_MS = 180, SCROLL_STEP = 20;

function flushMouse() {
  rafId = null;
  if (pendingDx || pendingDy) {
    post("/mouse", { dx: Math.round(pendingDx), dy: Math.round(pendingDy) });
    pendingDx = 0; pendingDy = 0;
  }
}
function scheduleFlush() { if (!rafId) rafId = requestAnimationFrame(flushMouse); }

pad.addEventListener("touchstart", e => {
  e.preventDefault(); hint.style.opacity = "0";
  for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
  if (e.touches.length === 1) { moved = false; tapTimer = setTimeout(() => tapTimer = null, TAP_MS + 60); }
  if (e.touches.length === 2) twoStart = Date.now();
}, { passive: false });

pad.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0], prev = touches[t.identifier];
    if (!prev) return;
    pendingDx += (t.clientX - prev.x) * SPEED;
    pendingDy += (t.clientY - prev.y) * SPEED;
    moved = true; scheduleFlush();
    touches[t.identifier] = { x: t.clientX, y: t.clientY };
  } else if (e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const p0 = touches[t0.identifier], p1 = touches[t1.identifier];
    if (!p0 || !p1) return;
    scrollAccum += ((t0.clientY - p0.y) + (t1.clientY - p1.y)) / 2;
    if (Math.abs(scrollAccum) >= SCROLL_STEP) {
      post("/mouse", { scroll: scrollAccum > 0 ? -1 : 1 });
      scrollAccum = 0;
    }
    touches[t0.identifier] = { x: t0.clientX, y: t0.clientY };
    touches[t1.identifier] = { x: t1.clientX, y: t1.clientY };
    moved = true;
  }
}, { passive: false });

pad.addEventListener("touchend", e => {
  e.preventDefault();
  if (!moved && tapTimer && e.changedTouches.length === 1 && e.touches.length === 0) {
    post("/mouse", { btn: "click" }); setStatus("click");
  }
  if (e.touches.length === 0 && twoStart && Date.now() - twoStart < TAP_MS && !moved) {
    post("/mouse", { btn: "rightclick" }); setStatus("right click"); twoStart = 0;
  }
  for (const t of e.changedTouches) delete touches[t.identifier];
  if (e.touches.length === 0) { moved = false; scrollAccum = 0; twoStart = 0; }
}, { passive: false });

pad.addEventListener("touchcancel", e => {
  for (const t of e.changedTouches) delete touches[t.identifier];
  pendingDx = 0; pendingDy = 0;
}, { passive: false });

// ── Keyboard ──
const MODS = { shift: false, ctrl: false, alt: false };
document.querySelectorAll(".key[data-key]").forEach(el => {
  const k = el.dataset.key;
  const isMod = k === "shift" || k === "ctrl" || k === "alt";
  el.addEventListener("pointerdown", ev => {
    ev.preventDefault();
    if (isMod) {
      MODS[k] = !MODS[k];
      document.querySelectorAll(`[data-key="${k}"]`).forEach(e => e.classList.toggle("held", MODS[k]));
      post("/key", { key: k, action: MODS[k] ? "down" : "up" });
    } else {
      const snap = { ...MODS };
      post("/key", { key: k, action: "tap" }).then(() => {
        if (snap.shift) { MODS.shift = false; document.querySelectorAll('[data-key="shift"]').forEach(e => e.classList.remove("held")); post("/key", { key: "shift", action: "up" }); }
        if (snap.ctrl)  { MODS.ctrl  = false; document.querySelectorAll('[data-key="ctrl"]').forEach(e => e.classList.remove("held"));  post("/key", { key: "ctrl",  action: "up" }); }
        if (snap.alt)   { MODS.alt   = false; document.querySelectorAll('[data-key="alt"]').forEach(e => e.classList.remove("held"));   post("/key", { key: "alt",   action: "up" }); }
      });
      el.classList.add("active-flash");
      setTimeout(() => el.classList.remove("active-flash"), 100);
    }
  });
});
</script>
</body>
</html>
