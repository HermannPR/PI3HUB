<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILDRED PIERCE FRACTAL AGREEMENT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #e0d6ff;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 24px;
  }

  h1 {
    font-size: 9px;
    letter-spacing: 2px;
    color: #7b5ea7;
    text-align: center;
    line-height: 1.8;
  }

  #game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #tama-canvas {
    cursor: pointer;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 12px #7b5ea7);
    transition: filter 0.1s;
  }
  #tama-canvas.cooldown {
    filter: drop-shadow(0 0 4px #3a2a5a);
    opacity: 0.6;
  }

  #score-display {
    font-size: 10px;
    color: #c4b0ff;
    letter-spacing: 2px;
  }

  #status-msg {
    font-size: 7px;
    color: #7b5ea7;
    height: 12px;
    letter-spacing: 1px;
  }

  /* Leaderboard */
  #leaderboard-section {
    width: 100%;
    max-width: 340px;
  }

  #leaderboard-section h2 {
    font-size: 8px;
    color: #7b5ea7;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }

  #board {
    width: 100%;
    border-collapse: collapse;
  }
  #board tr { border-bottom: 1px solid #1e1a2e; }
  #board td {
    padding: 6px 4px;
    font-size: 8px;
    letter-spacing: 1px;
  }
  #board td:first-child { color: #4a3a6a; width: 28px; }
  #board td:nth-child(2) { color: #e0d6ff; }
  #board td:last-child { color: #c4b0ff; text-align: right; }
  #board tr:first-child td:nth-child(2) { color: #ffd700; }

  /* Nick submit */
  #submit-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  #nick-inputs {
    display: flex;
    gap: 8px;
  }

  .nick-box {
    width: 38px;
    height: 44px;
    background: #0f0d1a;
    border: 2px solid #3a2a5a;
    color: #e0d6ff;
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    caret-color: #7b5ea7;
  }
  .nick-box:focus { border-color: #7b5ea7; }

  #submit-btn {
    background: #7b5ea7;
    border: none;
    color: #0a0a0f;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 10px 20px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #submit-btn:hover { background: #c4b0ff; }
  #submit-btn:disabled { background: #3a2a5a; cursor: default; }

  #submit-msg {
    font-size: 7px;
    color: #7b5ea7;
    height: 12px;
  }
</style>
</head>
<body>

<h1>MILDRED PIERCE<br>FRACTAL AGREEMENT</h1>

<div id="game-area">
  <canvas id="tama-canvas" width="192" height="224"></canvas>
  <div id="score-display">SCORE: 0</div>
  <div id="status-msg"></div>
</div>

<div id="leaderboard-section">
  <h2>— TOP 10 —</h2>
  <table id="board"><tbody id="board-body"></tbody></table>
  <div id="submit-area">
    <div id="nick-inputs">
      <input class="nick-box" maxlength="1" data-idx="0">
      <input class="nick-box" maxlength="1" data-idx="1">
      <input class="nick-box" maxlength="1" data-idx="2">
      <input class="nick-box" maxlength="1" data-idx="3">
    </div>
    <button id="submit-btn">SUBMIT</button>
    <div id="submit-msg"></div>
  </div>
</div>

<script src="tamagotchi.js"></script>
<script src="leaderboard.js"></script>
</body>
</html>
