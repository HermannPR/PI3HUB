<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JARVIS PI3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #020508;
  --bg2:     #060c14;
  --accent:  #2a7a96;
  --accent2: #1a4a5c;
  --text:    #7a9aaa;
  --bright:  #b8d0dc;
  --dim:     #152030;
  --sep:     #0a1820;
}
html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  overflow: hidden;
  user-select: none;
}

/* CRT scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 900;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
  );
}

/* horizontal sweep */
#sweep {
  position: fixed; left: 0; right: 0; height: 1px;
  background: linear-gradient(
    90deg, transparent 0%, var(--accent) 50%, transparent 100%
  );
  opacity: 0.18;
  animation: sweep 12s linear infinite;
  pointer-events: none; z-index: 800;
}
@keyframes sweep { from { top: -1px } to { top: 100vh } }

/* corner brackets */
.corner {
  position: fixed; width: 24px; height: 24px;
  opacity: 0.3; animation: fadeIn 2s ease both;
}
.corner.tl { top: 16px; left: 16px;
  border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
.corner.tr { top: 16px; right: 16px;
  border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
.corner.bl { bottom: 48px; left: 16px;
  border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
.corner.br { bottom: 48px; right: 16px;
  border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

/* main layout */
#wrap {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0; padding: 20px;
}

/* logo */
#logo {
  font-size: clamp(32px, 6vw, 64px);
  letter-spacing: 0.5em;
  color: var(--bright);
  font-weight: 700;
  margin-bottom: 6px;
  animation: fadeIn 1s ease both;
}
#sub {
  font-size: clamp(8px, 1.1vw, 12px);
  letter-spacing: 0.3em;
  color: var(--dim);
  margin-bottom: clamp(28px, 6vh, 56px);
  animation: fadeIn 1.3s ease both;
}

/* QR */
#qr-outer {
  position: relative;
  margin-bottom: clamp(12px, 2vh, 24px);
  animation: fadeIn 1.7s ease both;
}
#qr-img {
  display: block;
  width: clamp(120px, 16vw, 180px);
  height: clamp(120px, 16vw, 180px);
  image-rendering: pixelated;
  border: 1px solid var(--accent2);
  background: var(--bg2);
}
#qr-ring {
  position: absolute; inset: -5px;
  border: 1px solid var(--accent);
  animation: ring 3.5s ease-in-out infinite;
}
@keyframes ring { 0%,100%{opacity:0.1} 50%{opacity:0.4} }
/* url fallback / link button */
#url-btn {
  display: none;
  margin-top: 6px;
  padding: 7px 18px;
  border: 1px solid var(--accent);
  border-radius: 3px;
  color: var(--accent);
  font-size: clamp(9px, 1.2vw, 13px);
  letter-spacing: 0.08em;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
}
/* terminal embed */
#term-embed {
  width: clamp(280px, 65vw, 720px);
  max-height: clamp(70px, 12vh, 110px);
  overflow: hidden;
  font-size: clamp(7px, 0.9vw, 10px);
  color: #1a3a28;
  line-height: 1.45;
  margin-top: 10px;
  padding: 5px 10px;
  border: 1px solid var(--sep);
  background: var(--bg2);
  border-radius: 2px;
  animation: fadeIn 3s ease both;
}
#term-embed div { white-space: pre; overflow: hidden; text-overflow: ellipsis; }

/* ip */
#ip {
  font-size: clamp(11px, 1.5vw, 15px);
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 14px;
  animation: fadeIn 2s ease both;
}

/* status */
#status {
  font-size: clamp(8px, 1.1vw, 12px);
  letter-spacing: 0.25em;
  color: var(--dim);
  min-height: 1.4em;
  transition: color 0.8s;
  animation: fadeIn 2.2s ease both;
}
#status.live { color: var(--accent); }
#cur { animation: blink 1.1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* footer stats */
#stats {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  gap: clamp(20px, 4vw, 60px);
  padding: 10px 20px;
  border-top: 1px solid var(--sep);
  font-size: clamp(8px, 1vw, 10px);
  letter-spacing: 0.18em;
  color: var(--dim);
  animation: fadeIn 2.5s ease both;
}
.slbl { color: #0a1820; margin-right: 4px; }

/* tamagotchi widget */
#tamago {
  margin-top: 12px;
  width: clamp(180px, 44vw, 320px);
  font-size: clamp(8px, 1vw, 10px);
  letter-spacing: 0.14em;
  animation: fadeIn 3.5s ease both;
}
#tama-hdr {
  color: var(--dim);
  margin-bottom: 5px;
}
#tama-dot  { transition: color 0.6s; }
#tama-txt  { transition: color 0.6s; }
.tama-row {
  display: flex; justify-content: space-between;
  color: var(--dim); padding: 1px 0; letter-spacing: 0.1em;
}

/* flash on connect */
#flash {
  position: fixed; inset: 0;
  background: var(--accent);
  opacity: 0; pointer-events: none; z-index: 1000;
  transition: opacity 0.25s;
}
#flash.show { opacity: 0.05; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: none; }
}
</style>
</head>
<body>

<div id="sweep"></div>
<div id="flash"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="wrap">
  <div id="logo">JARVIS</div>
  <div id="sub">RASPBERRY PI 3 — CONTROL INTERFACE</div>

  <div id="qr-outer">
    <img id="qr-img" src="/api/qr.png" alt=""
      onerror="this.style.display='none';document.getElementById('url-btn').style.display='block'">
    <div id="qr-ring"></div>
    <a id="url-btn" href="#"></a>
  </div>

  <div id="ip">--</div>
  <div id="status">AWAITING CONNECTION<span id="cur">_</span></div>
  <div id="term-embed"></div>
  <div id="tamago">
    <div id="tama-hdr">TAMA <span id="tama-dot">●</span> <span id="tama-txt">--</span></div>
    <div id="tama-board"></div>
  </div>
</div>

<div id="stats">
  <span><span class="slbl">TEMP</span><span id="s-temp">--</span></span>
  <span><span class="slbl">UP</span><span id="s-up">--</span></span>
  <span><span class="slbl">MODE</span><span id="s-mode">--</span></span>
</div>

<script>
var _done = false;

function goHome() {
  if (_done) return;
  _done = true;
  window.location.href = '/';
}

async function poll() {
  try {
    var r = await fetch('/api/boot/status');
    if (!r.ok) return;
    var d = await r.json();

    var url = 'http://' + d.ip + ':5000';
    document.getElementById('ip').textContent = url;
    var ub = document.getElementById('url-btn');
    ub.href = url; ub.textContent = url;

    if (d.temp != null)
      document.getElementById('s-temp').textContent =
        d.temp.toFixed(1) + 'C';
    if (d.uptime)
      document.getElementById('s-up').textContent = d.uptime;
    if (d.mode)
      document.getElementById('s-mode').textContent =
        d.mode.replace('-', ' ').toUpperCase();

    if (d.connected && !_done) {
      var st = document.getElementById('status');
      st.textContent = 'CONNECTION ESTABLISHED';
      st.classList.add('live');
      var fl = document.getElementById('flash');
      fl.classList.add('show');
      setTimeout(function() { fl.classList.remove('show'); }, 350);
      setTimeout(goHome, 1600);
    }
  } catch(e) {}
}

document.addEventListener('keydown', goHome);
document.addEventListener('click',   goHome);

// Force QR reload after 1s (IP may not be ready on first load)
setTimeout(function() {
  var img = document.getElementById('qr-img');
  img.src = '/api/qr.png?t=' + Date.now();
}, 1000);

// Terminal embed via SSE
(function() {
  var te = document.getElementById('term-embed');
  var lines = [];
  var MAX = 7;
  var es = new EventSource('/claude-state');
  es.onmessage = function(ev) {
    try {
      var d = JSON.parse(ev.data);
      if (d.ping) return;
      if (d.reset) lines = [];
      if (d.new_lines && d.new_lines.length) {
        lines = lines.concat(d.new_lines);
        if (lines.length > MAX) lines = lines.slice(-MAX);
        te.innerHTML = '';
        lines.forEach(function(l) {
          var r = document.createElement('div');
          r.textContent = l || ' ';
          te.appendChild(r);
        });
      }
    } catch(ex) {}
  };
})();

async function pollTamago() {
  try {
    var r = await fetch('/api/tamago');
    if (!r.ok) return;
    var d = await r.json();
    var dot   = document.getElementById('tama-dot');
    var txt   = document.getElementById('tama-txt');
    var board = document.getElementById('tama-board');
    if (d.online) {
      dot.style.color = 'var(--accent)';
      txt.style.color = 'var(--accent)';
      txt.textContent = 'ONLINE';
      var scores = (d.scores || []).slice(0, 5);
      board.innerHTML = scores.map(function(s) {
        return '<div class="tama-row"><span>#' + s.rank + '  ' + s.nick + '</span>' +
               '<span>' + s.score.toLocaleString() + '</span></div>';
      }).join('');
    } else {
      dot.style.color = 'var(--dim)';
      txt.style.color = 'var(--dim)';
      txt.textContent = 'OFFLINE';
      board.innerHTML = '';
    }
  } catch(e) {}
}

poll();
setInterval(poll, 2000);
pollTamago();
setInterval(pollTamago, 30000);
</script>
</body>
</html>
